<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Family Task Manager</title>


  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Family Task Manager</h1>
<h1>מנהל משימות משפחתי</h1>

<!-- LOGIN -->
<section id="login">
  <input id="username" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Login התחבר</button>
</section>

<!-- APP -->
<section id="app" hidden>
  <h2 id="welcome"></h2>
  <button onclick="logout()">Logout התנתק</button>
 

  <button id="resetBtn" onclick="resetAppData()" hidden>Reset App</button>

  <button id="newUserBtn" onclick="toggleNewUser()">New User</button>

   <div id="adminCreateUser" class="form-card" hidden>
  <h3>👤 Create New User</h3>

  <input id="newUserEmail" placeholder="User email">
  <input id="newUserPassword" type="password" placeholder="Password">
  <select id="newUserRole">
    <option value="child">Child</option>
    <option value="parent">Parent</option>
  </select>

  <button onclick="createUser()">Create User</button>
  <button onclick="toggleNewUser()">Cancel</button>
</div>


  <button id="newTaskBtn" onclick="toggleTaskForm()">New Task משימה חדשה</button>
  <div id="taskForm" class="form-card" hidden>
    <select id="assignTo" hidden>
      <option value="">Assign to...</option>
    </select>
    <input id="taskTitle" placeholder="Task title" />
    <textarea id="taskContent" placeholder="Task details"></textarea>
    <select id="taskCategory">
    <option value="">Select category...</option>
    <option value="Homework" data-color="#9e9e9e">Homework</option>
    <option value="Chores" data-color="#2196f3">Chores</option>
    <option value="Personal" data-color="#4caf50">Personal</option>
    <option value="Other">Other</option>
  </select>
  
  <input id="taskDue" type="date" />

    <button onclick="addTask()">Add Task</button>
    <button onclick="toggleTaskForm()">Cancel</button>
  </div>

   
  <!-- FILTERS -->
<div class="filters">
  <!-- User filter -->
  <div class="filter">
    <button class="filter-btn"
        onclick="event.stopPropagation(); toggleDropdown('userFilter')">
  👤 User
</button>

    <div id="userFilter" class="dropdown">
      <div onclick="event.stopPropagation(); setUserFilter('all')">All Users</div>
    </div>
  </div>

  <!-- Category filter -->
  <div class="filter">
    <button class="filter-btn"
        onclick="event.stopPropagation(); toggleDropdown('categoryFilter')">
  📁 Category
</button>
    <div id="categoryFilter" class="dropdown">
      <div onclick="event.stopPropagation(); setCategoryFilter('all')">All Categories</div>
<div onclick="event.stopPropagation(); setCategoryFilter('Homework')">Homework</div>
<div onclick="event.stopPropagation(); setCategoryFilter('Chores')">Chores</div>
<div onclick="event.stopPropagation(); setCategoryFilter('Personal')">Personal</div>
<div onclick="event.stopPropagation(); setCategoryFilter('Other')">Other</div>
    </div>
  </div>
</div>

  <h3>TO DO</h3>
  <ul id="taskList"></ul>

  <h3 onclick="toggleArchive()" style="cursor:pointer">DONE ▼</h3>
  <ul id="archiveList"></ul>
</section>

<!-- 🔥 FIREBASE CONFIG -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBJxZ81pS7dO0RAzp_uYw6RkM5faAl9t8U",
  authDomain: "family-task-manager-f2ccd.firebaseapp.com",
  projectId: "family-task-manager-f2ccd",
  storageBucket: "family-task-manager-f2ccd.firebasestorage.app",
  messagingSenderId: "678267291982",
  appId: "1:678267291982:web:dba22eb8976ed3d186b61f"
};

  const app = initializeApp(firebaseConfig);
  window.auth = getAuth(app);
  window.db = getFirestore(app);
</script>

<script type="module" src="app.js"></script>
</body>
</html>
